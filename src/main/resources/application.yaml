spring:
  application:
    name: auth
  config:
    import: optional:config
  cloud:
    config:
      enabled: false
      import-check:
        enabled: false

  datasource:
    url: jdbc:postgresql://192.168.1.33:9090/interview-prep
    username: trails
    password: Trails#DB
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          dialect: org.hibernate.dialect:PostgreSQLDialect
